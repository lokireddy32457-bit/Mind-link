# =========================================
# Mind Link — Render Blueprint (IaC)
# =========================================
# This file lets Render auto-configure your
# service when you connect your repo.
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: mind-link
    runtime: python
    region: oregon
    plan: free

    # Build & Start commands
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn.conf.py wsgi:app

    # Environment variables
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
